<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Fleet Centre</title>
    <link href="/css/styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/nav.css"/>
    <link rel="stylesheet" href="/css/login.css"/>
    <script src="js/main.js" defer></script>
    <script type="module" src="js/login.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>    
    <header>
        <script id="replace_with_navbar" src="js/nav.js"></script>
    </header>
    <div id="splashContainer">
        <img id="backgroundSplash" src="images/HQScreenshot_1080.png" alt="Alternate Text" />
        <div id="gradientOverlay"></div>
    </div>
    <div id="heroContainer">
       <div class="card">
            <form name="VFCLogin">
                <p>
                <label for="logUser">Username</label>
                <input type="text" id="logUser" name="logUser">
                </p>
                <p>
                <label for="logPassword">Password</label>
                <input type="password" id="logPassword" name="logPassword">
                </p>
                <button type="submit" id="logSubmit" value="Submit">Submit</button>
            </form>
       </div>
    </div>
    <footer>

    </footer>

</body>
</html>
