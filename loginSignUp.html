<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/styles.css">  
    <link rel="stylesheet" href="/css/nav.css"/>
    <link rel="stylesheet" href="/css/colourPicker.css">
    <link rel="stylesheet" href="/css/loginSignUp.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">

<body>
    <div id="splashContainer">
        <img id="backgroundSplash" src="images/HQScreenshot_1080.png" alt="Alternate Text" />
        <div id="gradientOverlay"></div>
    </div>
    <script id="replace_with_colourPicker" src="/js/colourPicker.js"></script>
    <script id="replace_with_navbar" data-name='login' src="/js/nav.js"></script>
    <div class="hero-container">        
        <div class="login large-card font-dark">
            <h2>Sign In</h2>
            <form action="dashboard_home.html">
                <ul>
                    <li>
                        <label for="userName_input">User Name</label>
                        <input type="text" name="userName_input" id="userName_input" >
                    </li>
                    <li>
                        <label for="password_input" >Password</label>
                        <input type="password" name="password_input" id="password_input" >
                    </li>
                    <li>
                        <input type="checkbox" name="rememberUser" id="rememberUser">
                        <label for="rememberUser" >Remember me on this Computer</label>
                    </li>
                    <li>
                        <button type="submit" id="logSubmit" value="Submit">Login</button>
                    </li>
                </ul>
            </form>
        </div>
        <div class="signup large-card font-dark">
            <h2>Sign Up</h2>
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ad nemo a, officiis quo rem ullam quaerat nulla veritatis vitae inventore ex corrupti iste. Necessitatibus laborum error, eveniet alias omnis suscipit.</p>
            <button type="submit" id="logSubmit" value="Submit">Join</button>
        </div>
    </div>
    <footer>
    </footer>
</body>
